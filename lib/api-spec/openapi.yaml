openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Social Media Downloader API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: download
    description: Download operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /download/info:
    post:
      operationId: getMediaInfo
      tags: [download]
      summary: Get media info and available formats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaInfoRequest"
      responses:
        "200":
          description: Media info retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaInfo"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /download/file:
    post:
      operationId: downloadFile
      tags: [download]
      summary: Get a direct download link for a specific format
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadRequest"
      responses:
        "200":
          description: Download link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadLink"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /download/supported-platforms:
    get:
      operationId: getSupportedPlatforms
      tags: [download]
      summary: Get list of supported platforms
      responses:
        "200":
          description: Supported platforms list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportedPlatforms"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MediaInfoRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: URL of the media to download

    MediaFormat:
      type: object
      required: [formatId, quality, ext, filesize]
      properties:
        formatId:
          type: string
        quality:
          type: string
        ext:
          type: string
        filesize:
          type: ["integer", "null"]
        resolution:
          type: ["string", "null"]
        fps:
          type: ["number", "null"]
        vcodec:
          type: ["string", "null"]
        acodec:
          type: ["string", "null"]
        hasVideo:
          type: boolean
        hasAudio:
          type: boolean

    MediaInfo:
      type: object
      required: [title, platform, thumbnail, duration, formats, mediaType]
      properties:
        title:
          type: string
        platform:
          type: string
        thumbnail:
          type: ["string", "null"]
        duration:
          type: ["number", "null"]
        uploader:
          type: ["string", "null"]
        viewCount:
          type: ["integer", "null"]
        mediaType:
          type: string
          enum: [video, image, audio]
        formats:
          type: array
          items:
            $ref: "#/components/schemas/MediaFormat"

    DownloadRequest:
      type: object
      required: [url, formatId]
      properties:
        url:
          type: string
        formatId:
          type: string

    DownloadLink:
      type: object
      required: [downloadUrl, filename, ext]
      properties:
        downloadUrl:
          type: string
        filename:
          type: string
        ext:
          type: string

    Platform:
      type: object
      required: [name, icon, examples]
      properties:
        name:
          type: string
        icon:
          type: string
        examples:
          type: array
          items:
            type: string

    SupportedPlatforms:
      type: object
      required: [platforms]
      properties:
        platforms:
          type: array
          items:
            $ref: "#/components/schemas/Platform"

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
